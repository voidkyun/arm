name: CI

on:
  push:
    branches:
      - "**"

jobs:
  test:
    name: cabal test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "latest"

      - name: Update package index
        run: cabal update

      - name: Build all packages
        run: cabal build all

      - name: Run all tests
        run: cabal test all
